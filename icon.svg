<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1815"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <rect x="48" y="48" width="416" height="416" rx="48" fill="none" stroke="#d4a574" stroke-width="2" opacity=".15"/>
  <!-- House icon -->
  <g transform="translate(256,260)" fill="none" stroke="#d4a574" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- roof -->
    <polyline points="-120,40 0,-100 120,40" fill="rgba(212,165,116,.15)" stroke="#d4a574"/>
    <!-- walls -->
    <rect x="-80" y="40" width="160" height="100" rx="4" fill="rgba(212,165,116,.08)" stroke="#d4a574"/>
    <!-- door -->
    <rect x="-20" y="80" width="40" height="60" rx="2" fill="rgba(212,165,116,.12)" stroke="#d4a574" stroke-width="6"/>
    <!-- window left -->
    <rect x="-65" y="60" width="30" height="30" rx="3" fill="rgba(212,165,116,.08)" stroke="#d4a574" stroke-width="5"/>
    <!-- window right -->
    <rect x="35" y="60" width="30" height="30" rx="3" fill="rgba(212,165,116,.08)" stroke="#d4a574" stroke-width="5"/>
    <!-- chimney -->
    <line x1="70" y1="-60" x2="70" y2="-20" stroke="#d4a574" stroke-width="10"/>
    <rect x="50" y="-70" width="40" height="20" rx="3" fill="rgba(212,165,116,.12)" stroke="#d4a574" stroke-width="5"/>
  </g>
</svg>
